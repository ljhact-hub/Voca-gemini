<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yonsei TOEIC Vocabulary Trainer</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="background-overlay"></div>

    <div class="app-container">
        <header class="glass-panel text-center">
            <h1 class="logo">YONSEI <span>UNIVERSITY</span></h1>
            <p class="subtitle">연세의 이름으로 외운다.</p>
            <h2 class="app-title">TOEIC Vocabulary Trainer</h2>
        </header>

        <section id="menu-view" class="view-section active glass-panel">
            <div class="stats-box">
                <h3>학습 현황</h3>
                <p>총 단어 수: <span id="total-words">0</span>개</p>
                <p>오답 노트: <span id="incorrect-words">0</span>개</p>
                <div class="progress-container mt-10">
                    <div id="total-progress" class="fill"></div>
                </div>
                <p class="progress-text">전체 진행률: <span id="progress-percent">0</span>%</p>
            </div>
            <div class="menu-grid">
                <button class="btn primary" onclick="app.changeView('list-view')">단어장 보기</button>
                <button class="btn primary" onclick="app.startQuiz(false)">단어 퀴즈 풀기</button>
                <button class="btn primary" onclick="app.startFlashcards()">플래시카드</button>
                <button class="btn secondary" onclick="app.startQuiz(true)">오답 다시 풀기</button>
            </div>
        </section>

        <section id="list-view" class="view-section glass-panel">
            <div class="view-header">
                <h2>단어장</h2>
                <button class="btn-small" onclick="app.changeView('menu-view')">메뉴로</button>
            </div>
            <input type="text" id="search-input" placeholder="영어/한국어 검색..." onkeyup="app.searchWords()">
            <div class="word-list" id="word-list-container"></div>
        </section>

        <section id="quiz-view" class="view-section glass-panel">
            <div class="view-header">
                <h2 id="quiz-title">단어 퀴즈</h2>
                <button class="btn-small" onclick="app.changeView('menu-view')">종료</button>
            </div>
            <div class="progress-container mb-10">
                <div id="quiz-progress" class="fill"></div>
            </div>
            <p id="quiz-counter" class="text-right text-muted">1 / 10</p>
            <div class="quiz-question">
                <h1 id="quiz-word">word</h1>
            </div>
            <div class="quiz-options" id="quiz-options-container"></div>
        </section>

        <section id="result-view" class="view-section glass-panel text-center">
            <h2>퀴즈 결과</h2>
            <h1 id="result-score" class="score-text">0 / 0</h1>
            <p id="result-message" class="mb-20"></p>
            <button class="btn primary" onclick="app.changeView('menu-view')">메뉴로 돌아가기</button>
        </section>

        <section id="flashcard-view" class="view-section glass-panel">
            <div class="view-header">
                <h2>플래시카드</h2>
                <button class="btn-small" onclick="app.changeView('menu-view')">메뉴로</button>
            </div>
            <p id="flashcard-counter" class="text-center mb-10 text-muted">1 / 10</p>
            <div class="flashcard-container" onclick="app.flipCard()">
                <div id="flashcard-inner" class="flashcard-inner">
                    <div class="flashcard-front">
                        <h1 id="flashcard-word">word</h1>
                        <p class="hint">클릭하여 뜻 확인</p>
                    </div>
                    <div class="flashcard-back">
                        <h1 id="flashcard-meaning">뜻</h1>
                    </div>
                </div>
            </div>
            <div class="flashcard-controls">
                <button class="btn primary" onclick="app.prevCard()">이전</button>
                <button class="btn primary" onclick="app.nextCard()">다음</button>
            </div>
        </section>
    </div>

    <script src="./script.js"></script>
</body>
</html>
